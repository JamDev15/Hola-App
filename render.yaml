services:
  - type: web
    name: Hola-App
    runtime: python
    region: oregon
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false

      # Anthropic / Claude
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6

      # Gemini (used for routing recommendations in ai.py)
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash

      # Microsoft SharePoint / Azure AD
      - key: SHAREPOINT_TENANT_ID
        sync: false
      - key: SHAREPOINT_CLIENT_ID
        sync: false
      - key: SHAREPOINT_CLIENT_SECRET
        sync: false

      # Dropbox artwork storage
      - key: DROPBOX_ACCESS_TOKEN
        sync: false
      - key: DROPBOX_FOLDER_PATH
        value: /Artwork Proofing

      - key: ALLOWED_ORIGINS
        value: https://hola-app-chi.vercel.app,https://hola-9ho9l32fa-jamilahduarte.vercel.app,http://localhost:5173,http://localhost:3000
